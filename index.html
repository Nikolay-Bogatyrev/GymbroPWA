<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <script>
    if (location.hostname.includes('github.io')) {
      var base = document.createElement('base');
      base.href = '/GymbroPWA/';
      document.head.insertBefore(base, document.head.firstChild);
    }
  </script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>GymBro</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="shortcut icon" href="icons/icon-192.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              900: '#111827',
              800: '#1f2937',
              700: '#374151',
              600: '#4b5563',
              500: '#6b7280',
              400: '#9ca3af',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-900 text-white min-h-screen" x-data="gymTracker()" x-init="init()">

  <!-- Update banner: показывается когда SW нашёл новую версию -->
  <div x-show="updateAvailable"
       x-transition
       class="fixed top-0 inset-x-0 z-50 bg-blue-500 text-white px-4 py-2 flex items-center gap-3 shadow-lg"
       style="display:none;">
    <div class="flex-1 text-sm">
      <p class="font-semibold">Доступно обновление</p>
      <p class="text-xs text-blue-100">Нажми «Обновить» чтобы применить.</p>
    </div>
    <button type="button" @click="applyUpdate()"
            class="bg-white text-blue-600 font-bold rounded-lg px-3 py-1.5 text-sm shrink-0">
      Обновить
    </button>
    <button type="button" @click="dismissUpdate()"
            class="text-white/80 hover:text-white shrink-0 px-1"
            title="Позже">✕</button>
  </div>


  <!-- ========== СТРАНИЦА: DASHBOARD ========== -->
  <template x-if="page === 'dashboard'">
  <div class="min-h-screen p-4 pb-24">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold">GymBro</h1>
        <p class="text-gray-400 text-sm">Привет, <span x-text="profile.name"></span>! 👋</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm text-gray-400">Стрик</p>
          <p class="text-2xl font-bold text-orange-400 flex items-center gap-1">
            <i data-lucide="flame" class="w-5 h-5"></i>
            <span x-text="stats.streak"></span>
          </p>
        </div>
        <button type="button" @click="goSettings()" class="p-2 hover:bg-gray-800 rounded-lg" title="Настройки">
          <i data-lucide="settings-2" class="w-5 h-5 text-gray-400"></i>
        </button>
      </div>
    </div>

    <!-- Week Progress Card -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <div class="flex justify-between items-center mb-3">
        <span class="text-gray-400">Эта неделя</span>
        <span class="text-lg font-semibold">
          <span x-text="stats.weekCompleted"></span>/<span x-text="stats.weekTotal"></span>
        </span>
      </div>
      
      <!-- Week days (тап — отметить тренировку: прогулка, зал и т.д.) -->
      <div class="flex gap-1 mb-3">
        <template x-for="(day, index) in getWeekDaysStatus()" :key="day.dayName + day.dateStr">
          <div class="flex-1 text-center">
            <button
              type="button"
              @click="markDayAsWorkout(day)"
              :disabled="!day.canMark"
              :title="day.canMark ? (day.completed ? 'День с тренировкой' : 'Отметить тренировку (прогулка, зал)') : ''"
              class="w-full h-10 rounded-lg mb-1 flex items-center justify-center transition-colors disabled:cursor-default"
              :class="{
                'bg-green-500 hover:bg-green-600 active:scale-95 cursor-pointer': day.completed && day.canMark,
                'bg-blue-500 animate-pulse hover:bg-blue-600 active:scale-95 cursor-pointer': day.isToday && !day.completed && day.canMark,
                'bg-gray-700 hover:bg-gray-600 active:scale-95 cursor-pointer': day.canMark && !day.completed && !day.isToday,
                'bg-gray-700 cursor-default': !day.canMark
              }"
            >
              <i x-show="day.completed" data-lucide="check" class="w-5 h-5"></i>
              <i x-show="day.canMark && !day.completed" data-lucide="plus" class="w-4 h-4 opacity-70"></i>
            </button>
            <span class="text-xs text-gray-500" x-text="day.dayName"></span>
          </div>
        </template>
      </div>
      
      <!-- Stats row -->
      <div class="flex justify-between text-sm">
        <div class="text-center">
          <p class="text-gray-400">Кардио</p>
          <p class="font-semibold text-blue-400"><span x-text="stats.cardioMinutes"></span> мин</p>
        </div>
        <div class="text-center">
          <p class="text-gray-400">Настроение</p>
          <p class="font-semibold text-green-400">⌀ <span x-text="(stats.avgMood ?? 0).toFixed(1)"></span></p>
        </div>
      </div>
    </div>

    <!-- HR Zones Card -->
    <div class="bg-gradient-to-r from-red-900/50 to-orange-900/50 rounded-2xl p-4 mb-4 border border-red-700/50">
      <div class="flex items-center gap-2 mb-2">
        <i data-lucide="heart" class="w-5 h-5 text-red-400"></i>
        <span class="font-semibold">Пульсовые зоны</span>
        <span class="text-xs text-gray-400 ml-auto">Возраст: <span x-text="profile.age"></span></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Макс ЧСС</p>
          <p class="text-xl font-bold text-red-400" x-text="profile.maxHR"></p>
        </div>
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Жиросжигание</p>
          <p class="text-xl font-bold text-orange-400">
            <span x-text="profile.fatBurnLow"></span>-<span x-text="profile.fatBurnHigh"></span>
          </p>
        </div>
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Интервал</p>
          <p class="text-xl font-bold text-yellow-400">
            <span x-text="profile.intervalLow"></span>-<span x-text="profile.intervalHigh"></span>
          </p>
        </div>
      </div>
    </div>

    <!-- Start Workout Button -->
    <button
      type="button"
      @click="goPickTemplate()"
      class="w-full bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl p-5 mb-4 flex items-center justify-between shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-transform"
    >
      <div class="flex items-center gap-3">
        <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center">
          <i data-lucide="dumbbell" class="w-8 h-8"></i>
        </div>
        <div class="text-left">
          <p class="font-bold text-lg">Начать тренировку</p>
          <p class="text-blue-200 text-sm" x-text="getTodayPlan()"></p>
        </div>
      </div>
      <i data-lucide="chevron-right" class="w-6 h-6"></i>
    </button>

    <!-- v2: Programs + Bank + Trackers nav -->
    <div class="grid grid-cols-3 gap-2 mb-4">
      <button
        type="button"
        @click="goPrograms()"
        class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-3 flex flex-col items-start gap-2 active:scale-[0.98] transition-transform border border-gray-700"
      >
        <div class="w-9 h-9 bg-emerald-500/20 rounded-lg flex items-center justify-center">
          <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-400"></i>
        </div>
        <div class="text-left">
          <p class="font-semibold text-sm">Программы</p>
          <p class="text-[10px] text-gray-400 truncate w-full" x-text="activeProgram ? activeProgram.name : 'Не выбрана'"></p>
        </div>
      </button>
      <button
        type="button"
        @click="goBank()"
        class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-3 flex flex-col items-start gap-2 active:scale-[0.98] transition-transform border border-gray-700"
      >
        <div class="w-9 h-9 bg-indigo-500/20 rounded-lg flex items-center justify-center">
          <i data-lucide="library" class="w-5 h-5 text-indigo-400"></i>
        </div>
        <div class="text-left">
          <p class="font-semibold text-sm">Банк</p>
          <p class="text-[10px] text-gray-400"><span x-text="(window.EXERCISE_BANK||[]).length"></span> упр</p>
        </div>
      </button>
      <button
        type="button"
        @click="goTrackers()"
        class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-3 flex flex-col items-start gap-2 active:scale-[0.98] transition-transform border border-gray-700"
      >
        <div class="w-9 h-9 bg-amber-500/20 rounded-lg flex items-center justify-center">
          <i data-lucide="target" class="w-5 h-5 text-amber-400"></i>
        </div>
        <div class="text-left">
          <p class="font-semibold text-sm">Трекеры</p>
          <p class="text-[10px] text-gray-400"><span x-text="trackersList.length"></span> привычек</p>
        </div>
      </button>
    </div>

    <!-- v2: Утренняя зарядка (быстрый запуск) -->
    <button
      type="button"
      @click="openTemplate('tpl-daily-morning')"
      class="w-full bg-gradient-to-r from-yellow-500/20 to-orange-500/20 hover:from-yellow-500/30 hover:to-orange-500/30 rounded-xl p-3 mb-2 flex items-center gap-3 border border-yellow-500/30 active:scale-[0.99] transition-transform"
    >
      <div class="w-9 h-9 bg-yellow-500/30 rounded-lg flex items-center justify-center shrink-0">
        <i data-lucide="sun" class="w-5 h-5 text-yellow-300"></i>
      </div>
      <div class="flex-1 text-left">
        <p class="font-semibold text-sm">☀️ Утренняя зарядка</p>
        <p class="text-[10px] text-gray-400">15 мин · улица + турник: разминка, мобильность, сила, растяжка</p>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
    </button>

    <!-- v2: Progress link -->
    <button
      type="button"
      @click="goProgress()"
      class="w-full bg-gray-800 hover:bg-gray-700 rounded-xl p-3 mb-4 flex items-center gap-3 border border-gray-700 active:scale-[0.99] transition-transform"
    >
      <div class="w-9 h-9 bg-purple-500/20 rounded-lg flex items-center justify-center shrink-0">
        <i data-lucide="trending-up" class="w-5 h-5 text-purple-400"></i>
      </div>
      <div class="flex-1 text-left">
        <p class="font-semibold text-sm">Прогресс упражнений</p>
        <p class="text-[10px] text-gray-400">1RM, тоннаж, личные рекорды</p>
      </div>
      <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
    </button>

    <!-- v2: Сегодня по программе -->
    <template x-if="todayPlanV2">
      <div class="bg-gray-800 rounded-2xl p-4 mb-4 border border-gray-700">
        <div class="flex items-center gap-2 mb-2">
          <i data-lucide="target" class="w-5 h-5 text-emerald-400"></i>
          <span class="font-semibold">Сегодня по программе</span>
        </div>
        <template x-if="todayPlanV2.isRest">
          <p class="text-gray-400 text-sm">День отдыха. Можешь отметить прогулку или сделать лёгкую зарядку.</p>
        </template>
        <template x-if="!todayPlanV2.isRest && todayPlanV2.template">
          <button
            type="button"
            @click="openTemplate(todayPlanV2.template.id)"
            class="w-full text-left flex items-center justify-between"
          >
            <div>
              <p class="font-semibold" x-text="todayPlanV2.template.name"></p>
              <p class="text-xs text-gray-400">
                <span x-text="todayPlanV2.template.items.length"></span> упражнений · ≈
                <span x-text="todayPlanV2.template.estimatedMinutes"></span> мин
              </p>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400"></i>
          </button>
        </template>
      </div>
    </template>

    <!-- Recent Workouts -->
    <div class="bg-gray-800 rounded-2xl p-4">
      <h3 class="font-semibold mb-3 flex items-center gap-2">
        <i data-lucide="calendar" class="w-5 h-5 text-gray-400"></i>
        Последние тренировки
      </h3>
      <div class="space-y-2">
        <template x-for="workout in recentWorkouts" :key="workout.id">
          <div class="flex items-center gap-3 bg-gray-700/50 rounded-xl p-3">
            <div
              class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
              :class="getWorkoutTypeColor(workout.type)"
              x-html="workout.type === 'cardio' ? iconSvg('activity') : iconSvg('dumbbell')"></div>
            <div class="flex-1 min-w-0">
              <p class="font-medium" x-text="workout.name"></p>
              <p class="text-sm text-gray-400" x-text="workout.date"></p>
            </div>
            <div class="text-right shrink-0">
              <p class="text-lg" x-text="getMoodEmoji(workout.mood)"></p>
              <p class="text-xs text-gray-400"><span x-text="workout.mood ?? workout.moodPost ?? 7"></span>/10</p>
            </div>
            <div class="flex gap-1 shrink-0">
              <button
                type="button"
                @click="editWorkout(workout)"
                class="p-2 hover:bg-gray-600 rounded-lg"
                title="Редактировать"
              >
                <i data-lucide="pencil" class="w-4 h-4"></i>
              </button>
              <button
                type="button"
                @click="deleteWorkout(workout.id)"
                class="p-2 hover:bg-red-500/30 rounded-lg text-red-400"
                title="Удалить"
              >
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: SELECT WORKOUT ========== -->
  <template x-if="page === 'select-workout'">
  <div class="min-h-screen p-4">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <button type="button" @click="page = 'dashboard'" class="p-2 hover:bg-gray-800 rounded-lg">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-xl font-bold">Выбери тренировку</h1>
      </div>
      <button type="button" @click="openManageExercises()" class="p-2 hover:bg-gray-800 rounded-lg" title="Управление упражнениями">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- Debug info (убрать после отладки) -->
    <div class="text-xs text-gray-500 mb-4">
      workoutList length: <span x-text="workoutList.length"></span>
    </div>

    <!-- Workout Cards -->
    <div class="space-y-3">
      <template x-for="workout in workoutList" :key="workout.key">
        <button
          type="button"
          @click="planWorkoutKey = workout.key; page = 'workout-plan'"
          class="w-full rounded-2xl p-4 flex items-center gap-4 shadow-lg active:scale-[0.98] transition-transform"
          :class="workout.gradient"
        >
          <div class="w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center p-2">
            <div x-html="getExerciseIcon(workout.exercises[0]?.icon || 'dumbbell')"></div>
          </div>
          <div class="flex-1 text-left">
            <p class="text-2xl mb-1" x-text="workout.emoji"></p>
            <p class="font-bold text-lg" x-text="workout.name"></p>
            <p class="text-white/70 text-sm">
              <span x-text="workout.exercises.length"></span> упражнений + 
              <span x-text="workout.cardio"></span> мин кардио
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-6 h-6"></i>
        </button>
      </template>

      <!-- Cardio Only -->
      <button
        type="button"
        @click="isCardioOnly = true; page = 'cardio'; saveSession()"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-600 rounded-2xl p-4 flex items-center gap-4 shadow-lg active:scale-[0.98] transition-transform"
      >
        <div class="w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center p-2">
          <div x-html="getExerciseIcon('treadmill')"></div>
        </div>
        <div class="flex-1 text-left">
          <p class="text-2xl mb-1">🏃</p>
          <p class="font-bold text-lg">Только кардио</p>
          <p class="text-white/70 text-sm">Пн/Ср/Пт — 45-60 минут</p>
        </div>
        <i data-lucide="chevron-right" class="w-6 h-6"></i>
      </button>
    </div>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: ПЛАН ТРЕНИРОВКИ ========== -->
  <template x-if="page === 'workout-plan'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="page = 'select-workout'; planWorkoutKey = null" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="workouts[planWorkoutKey]?.name || 'План тренировки'"></h1>
    </div>
    <template x-if="planWorkoutKey">
      <div>
        <div class="space-y-2 mb-6" :data-ver="inactiveVersion">
          <template x-for="(ex, i) in (workouts[planWorkoutKey]?.exercises || [])" :key="ex.id + '_' + (inactiveVersion || 0)">
            <div 
              draggable="true"
              @dragstart="onDragStart($event, i)"
              @dragover.prevent="onDragOver($event, i)"
              @drop="onDrop($event, i, 'plan')"
              @dragend="onDragEnd()"
              class="flex items-center gap-3 p-3 rounded-xl transition-opacity cursor-move"
              :class="{
                'bg-gray-800 opacity-60': isExerciseInactive(planWorkoutKey, ex.id),
                'bg-gray-800 opacity-50': dragState.dragging === i,
                'bg-gray-800': !isExerciseInactive(planWorkoutKey, ex.id) && dragState.dragging !== i
              }"
            >
              <div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center shrink-0" x-html="getExerciseIcon(ex.icon)"></div>
              <div class="flex-1 min-w-0">
                <p class="font-medium" x-text="ex.name"></p>
                <p class="text-xs text-gray-400" x-text="(ex.sets || 3) + '×' + (ex.reps || 12)"></p>
              </div>
              <label class="flex items-center gap-2 shrink-0 cursor-pointer" @click.stop>
                <input type="checkbox" :checked="isExerciseInactive(planWorkoutKey, ex.id)" @change="toggleExerciseInactive(planWorkoutKey, ex.id)" class="rounded">
                <span class="text-xs text-gray-500">Нет в зале</span>
              </label>
            </div>
          </template>
        </div>
        <button
          type="button"
          @click="startWorkoutFromPlan()"
          class="w-full py-4 rounded-xl bg-blue-500 hover:bg-blue-600 font-bold text-lg"
        >
          Начать тренировку
        </button>
      </div>
    </template>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: WORKOUT ========== -->
  <template x-if="page === 'workout'">
  <div class="min-h-screen pb-32">
    
    <!-- Header -->
    <div 
      class="p-4"
      :class="currentWorkout?.gradient || 'bg-gradient-to-r from-blue-500 to-blue-600'"
    >
      <div class="flex items-center justify-between mb-2">
        <button type="button" @click="page = 'select-workout'" class="p-2 hover:bg-white/20 rounded-lg">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <div class="text-center">
          <p class="text-sm opacity-80" x-text="currentWorkout?.name"></p>
          <p class="font-bold">
            <span x-text="currentExerciseIndex + 1"></span> / 
            <span x-text="currentWorkout?.exercises.length"></span>
          </p>
        </div>
        <button type="button" @click="page = 'complete'" class="p-2 hover:bg-white/20 rounded-lg text-sm">
          Завершить
        </button>
      </div>
      
      <!-- Progress bar -->
      <div class="h-2 bg-white/20 rounded-full overflow-hidden">
        <div 
          class="h-full bg-white transition-all duration-300"
          :style="`width: ${((currentExerciseIndex + 1) / (currentWorkout?.exercises.length || 1)) * 100}%`"
        ></div>
      </div>
    </div>

    <!-- Exercise Card -->
    <div class="p-4">
      <div class="bg-gray-800 rounded-2xl p-4 mb-4">
        <div class="flex items-start gap-4 mb-4">
          <div class="w-20 h-20 bg-gray-700 rounded-xl p-2">
            <div x-html="getExerciseIcon(currentExercise?.icon)"></div>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <h2 class="font-bold text-lg" x-text="(selectedAlt?.name || selectedAlt) || currentExercise?.name"></h2>
              <button
                type="button"
                x-show="getCurrentVideoUrl()"
                @click="openVideoModal()"
                class="p-1.5 rounded-lg bg-blue-500/30 hover:bg-blue-500/50 text-blue-400"
                title="Смотреть видео"
              >
                <i data-lucide="play" class="w-4 h-4"></i>
              </button>
            </div>
            <p class="text-gray-400">
              <span x-text="currentExercise?.sets"></span>×<span x-text="currentExercise?.reps"></span>
            </p>
            <p 
              x-show="currentExercise?.lastWeight !== 0"
              class="text-sm text-blue-400 flex items-center gap-1 mt-1"
            >
              <i data-lucide="trending-up" class="w-4 h-4"></i>
              Прошлый раз: <span x-text="currentExercise?.lastWeight"></span> кг
            </p>
          </div>
        </div>

        <!-- Alternatives Toggle -->
        <button
          type="button"
          @click="showAlternatives = !showAlternatives"
          class="w-full text-left text-sm text-gray-400 flex items-center gap-2 mb-2"
        >
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
          <span x-text="showAlternatives ? 'Скрыть альтернативы' : `Альтернативы (${currentExercise?.alts?.length || 0})`"></span>
        </button>
        
        <!-- Alternatives List -->
        <div x-show="showAlternatives" x-transition class="space-y-2 mb-4">
          <template x-for="(alt, i) in currentExercise?.alts" :key="i">
            <button
              type="button"
              @click="selectedAlt = (selectedAlt === alt ? null : alt); showAlternatives = false"
              class="w-full text-left p-2 rounded-lg text-sm transition-colors"
              :class="selectedAlt === alt ? 'bg-blue-500/30 border border-blue-500' : 'bg-gray-700'"
            >
              <span x-text="alt.name || alt"></span>
              <span x-show="alt.forWhat" class="text-gray-500 block text-xs mt-0.5" x-text="'→ ' + alt.forWhat"></span>
            </button>
          </template>
          <button
            type="button"
            x-show="selectedAlt"
            @click="selectedAlt = null"
            class="w-full text-left p-2 rounded-lg text-sm bg-gray-700"
          >
            ← Вернуть основное
          </button>
        </div>
      </div>

      <!-- Completed Sets -->
      <div x-show="currentExerciseSets.length > 0" class="mb-4">
        <p class="text-sm text-gray-400 mb-2">Записанные подходы:</p>
        <div class="flex flex-wrap gap-2">
          <template x-for="(set, i) in currentExerciseSets" :key="i">
            <div class="bg-green-500/20 border border-green-500/50 rounded-lg px-3 py-2 text-sm">
              <span class="text-green-400 font-semibold" x-text="set.weight + ' кг'"></span>
              <span class="text-gray-400"> × </span>
              <span x-text="set.reps"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Input Form -->
      <div class="bg-gray-800 rounded-2xl p-4">
        <p class="text-center text-gray-400 mb-4">
          Подход <span x-text="currentExerciseSets.length + 1"></span>
        </p>
        
        <!-- Weight Input -->
        <div class="mb-6">
          <p class="text-sm text-gray-400 text-center mb-2">Вес (кг)</p>
          <div class="flex items-center justify-center gap-4">
            <button
              type="button"
              @click="currentWeight = Math.max(0, currentWeight - 2)"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="minus" class="w-6 h-6"></i>
            </button>
            <div class="w-24 text-center">
              <p class="text-4xl font-bold" x-text="currentWeight"></p>
            </div>
            <button
              type="button"
              @click="currentWeight += 2"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
          </div>
        </div>

        <!-- Reps Input -->
        <div class="mb-6">
          <p class="text-sm text-gray-400 text-center mb-2">Повторения</p>
          <div class="flex items-center justify-center gap-4">
            <button
              type="button"
              @click="currentReps = Math.max(1, currentReps - 1)"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="minus" class="w-6 h-6"></i>
            </button>
            <div class="w-24 text-center">
              <p class="text-4xl font-bold" x-text="currentReps"></p>
            </div>
            <button
              type="button"
              @click="currentReps++"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
          </div>
        </div>

        <!-- Record Button -->
        <button
          type="button"
          @click="recordSet()"
          class="w-full bg-green-500 hover:bg-green-600 rounded-xl py-4 font-bold text-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
        >
          <i data-lucide="check" class="w-6 h-6"></i>
          Записать подход
        </button>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 p-4">
      <div class="flex gap-4 max-w-md mx-auto">
        <button
          type="button"
          :disabled="currentExerciseIndex === 0"
          @click="prevExercise()"
          class="flex-1 bg-gray-700 rounded-xl py-3 font-semibold disabled:opacity-50 flex items-center justify-center gap-2"
        >
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
          Назад
        </button>
        <button
          type="button"
          @click="nextExercise()"
          class="flex-1 bg-blue-500 rounded-xl py-3 font-semibold flex items-center justify-center gap-2"
        >
          Далее
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
    
    <!-- Video Modal -->
    <template x-if="videoModalOpen">
      <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4" @click.self="closeVideoModal()">
        <div class="relative w-full max-w-2xl aspect-video bg-black rounded-xl overflow-hidden">
          <iframe 
            :src="videoModalUrl" 
            class="w-full h-full"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
          <button
            type="button"
            @click="closeVideoModal()"
            class="absolute top-2 right-2 p-2 rounded-full bg-black/60 hover:bg-black/80"
          >
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </template>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: ОТДЫХ (ТАЙМЕР) ========== -->
  <template x-if="page === 'rest'">
  <div class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="text-6xl font-bold text-blue-400 mb-4" x-text="restTimer.secondsLeft"></div>
    <p class="text-gray-400 mb-8" x-text="restTimer.type === 'exercise' ? 'Следующее упражнение' : 'Следующий подход'"></p>
    <button
      type="button"
      @click="endRest()"
      class="w-full max-w-xs bg-blue-500 hover:bg-blue-600 rounded-xl py-4 font-bold text-lg"
      x-text="restTimer.type === 'exercise' ? 'Следующее упражнение' : 'Следующий подход'"
    ></button>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: CARDIO ========== -->
  <template x-if="page === 'cardio'">
  <div class="min-h-screen p-4">
    
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="page = isCardioOnly ? 'select-workout' : 'workout'" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="isCardioOnly ? 'Кардио тренировка' : `Кардио (${currentWorkout?.cardio || 30} мин)`"></h1>

    <!-- HR Zones reminder -->
    <div class="bg-gradient-to-r from-red-900/30 to-orange-900/30 rounded-xl p-3 mb-4 border border-red-700/30">
      <p class="text-sm text-gray-300 flex items-center gap-2">
        <i data-lucide="heart" class="w-4 h-4 text-red-400"></i>
        Целевой пульс: 
        <span class="font-bold text-orange-400">
          <span x-text="profile.fatBurnLow"></span>-<span x-text="profile.fatBurnHigh"></span> уд/мин
        </span>
      </p>
    </div>

    <!-- Cardio Type -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <p class="text-sm text-gray-400 mb-3">Тип кардио</p>
      <div class="grid grid-cols-3 gap-3">
        <template x-for="type in cardioTypes" :key="type.id">
          <button
            type="button"
            @click="cardioData.type = type.id"
            class="p-3 rounded-xl flex flex-col items-center gap-2 transition-colors"
            :class="cardioData.type === type.id ? 'bg-purple-500' : 'bg-gray-700'"
          >
            <div class="w-12 h-12" x-html="getExerciseIcon(type.icon)"></div>
            <span class="text-sm" x-text="type.name"></span>
          </button>
        </template>
      </div>
    </div>

    <!-- Duration -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <p class="text-sm text-gray-400 mb-3">Длительность (минуты)</p>
      <div class="flex items-center justify-center gap-4">
        <button
          type="button"
          @click="cardioData.duration = Math.max(5, cardioData.duration - 5)"
          class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center"
        >
          <i data-lucide="minus" class="w-6 h-6"></i>
        </button>
        <div class="w-24 text-center">
          <p class="text-4xl font-bold" x-text="cardioData.duration"></p>
        </div>
        <button
          type="button"
          @click="cardioData.duration += 5"
          class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center"
        >
          <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
      </div>
      
      <!-- Quick select -->
      <div class="flex justify-center gap-2 mt-3">
        <template x-for="min in [20, 30, 45, 60]" :key="min">
          <button
            type="button"
            @click="cardioData.duration = min"
            class="px-4 py-2 rounded-lg text-sm transition-colors"
            :class="cardioData.duration === min ? 'bg-purple-500' : 'bg-gray-700'"
            x-text="min"
          ></button>
        </template>
      </div>
    </div>

    <!-- Podcast -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <p class="text-sm text-gray-400 mb-2">🎧 Подкаст (опционально)</p>
      <input
        type="text"
        placeholder="NotebookLM: AI архитектура..."
        x-model="cardioData.podcast"
        class="w-full bg-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-purple-500"
      >
    </div>

    <button
      type="button"
      @click="page = 'complete'; saveSession()"
      class="w-full bg-purple-500 hover:bg-purple-600 rounded-xl py-4 font-bold text-lg active:scale-[0.98] transition-transform"
      x-text="isCardioOnly ? 'Завершить кардио' : 'Далее →'"
    ></button>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: COMPLETE ========== -->
  <template x-if="page === 'complete'">
  <div class="min-h-screen p-4">
    
    <!-- Success Header -->
    <div class="text-center mb-6">
      <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="award" class="w-10 h-10 text-green-400"></i>
      </div>
      <h1 class="text-2xl font-bold mb-2">Отличная работа! 💪</h1>
      <p class="text-gray-400">Осталось оценить самочувствие</p>
    </div>

    <!-- Mood Post Workout -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <p class="text-sm text-gray-400 mb-3">Как себя чувствуешь сейчас?</p>
      <div class="flex items-center justify-between mb-2">
        <span class="text-3xl" x-text="getMoodEmoji(moodPost)"></span>
        <span class="text-4xl font-bold" x-text="moodPost"></span>
      </div>
      <div class="slider-with-fill">
        <div class="slider-track slider-track-bg"></div>
        <div class="slider-track slider-track-fill slider-track-fill-green" :style="`width: ${((moodPost - 1) / 9 * 100)}%`"></div>
        <input
          type="range"
          min="1"
          max="10"
          x-model="moodPost"
          class="slider-input"
        >
      </div>
      <div class="flex justify-between text-xs text-gray-500 mt-1">
        <span>Плохо</span>
        <span>Отлично</span>
      </div>
    </div>

    <!-- Mood Day -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <p class="text-sm text-gray-400 mb-3">Общее самочувствие за день</p>
      <div class="flex items-center justify-between mb-2">
        <span class="text-3xl" x-text="getMoodEmoji(moodDay)"></span>
        <span class="text-4xl font-bold" x-text="moodDay"></span>
      </div>
      <div class="slider-with-fill">
        <div class="slider-track slider-track-bg"></div>
        <div class="slider-track slider-track-fill slider-track-fill-blue" :style="`width: ${((moodDay - 1) / 9 * 100)}%`"></div>
        <input
          type="range"
          min="1"
          max="10"
          x-model="moodDay"
          class="slider-input"
        >
      </div>
    </div>

    <!-- Notes -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-6">
      <p class="text-sm text-gray-400 mb-2">📝 Заметки (опционально)</p>
      <textarea
        placeholder="Плечо побаливало, сократил вес на жиме..."
        x-model="notes"
        class="w-full bg-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 min-h-[80px] resize-none"
      ></textarea>
    </div>

    <!-- Save Button -->
    <button
      type="button"
      @click="saveWorkout()"
      class="w-full bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl py-4 font-bold text-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
    >
      <i data-lucide="check" class="w-6 h-6"></i>
      Сохранить тренировку
    </button>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: РЕДАКТИРОВАНИЕ ТРЕНИРОВКИ ========== -->
  <template x-if="page === 'edit-workout'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="page = 'dashboard'; editingWorkout = null" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold">Редактировать тренировку</h1>
    </div>
    <template x-if="editingWorkout">
      <div>
        <div class="bg-gray-800 rounded-2xl p-4 mb-4">
          <p class="text-sm text-gray-400" x-text="editingWorkout.date"></p>
          <p class="font-bold text-lg" x-text="editingWorkout.name"></p>
        </div>
        <div class="bg-gray-800 rounded-2xl p-4 mb-4">
          <p class="text-sm text-gray-400 mb-3">Подходы</p>
          <template x-for="(set, i) in (editingWorkout.sets || [])" :key="i">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-sm text-gray-500 w-24 shrink-0" x-text="set.exerciseName || 'Сет ' + (i+1)"></span>
              <input type="number" min="0" step="2" x-model.number="set.weight" class="w-16 bg-gray-700 rounded-lg px-2 py-1 text-center">
              <span class="text-gray-500">кг ×</span>
              <input type="number" min="1" x-model.number="set.reps" class="w-14 bg-gray-700 rounded-lg px-2 py-1 text-center">

                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </template>
        </div>
        <div class="bg-gray-800 rounded-2xl p-4 mb-4" x-show="editingWorkout.cardio">
          <p class="text-sm text-gray-400 mb-2">Кардио</p>
          <div class="flex items-center gap-2">
            <input type="number" min="0" x-model.number="editingWorkout.cardio.duration" class="w-20 bg-gray-700 rounded-lg px-2 py-1">

          </div>

          <p class="text-sm text-gray-400 mb-2">Настроение после тренировки</p>

        </div>
        <div class="bg-gray-800 rounded-2xl p-4 mb-4">
          <p class="text-sm text-gray-400 mb-2">Самочувствие за день</p>
          <input type="range" min="1" max="10" x-model.number="editingWorkout.moodDay" class="w-full">

        <div class="bg-gray-800 rounded-2xl p-4 mb-4">
          <p class="text-sm text-gray-400 mb-2">Заметки</p>
          <textarea x-model="editingWorkout.notes" class="w-full bg-gray-700 rounded-xl p-3 min-h-[60px]"></textarea>

        <button

          Сохранить изменения
        </button>
      </div>
    </template>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: УПРАВЛЕНИЕ УПРАЖНЕНИЯМИ ========== -->
  <template x-if="page === 'manage-exercises'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="managingWorkoutKey ? backToWorkoutList() : (page = 'select-workout')" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="managingWorkoutKey ? (workouts[managingWorkoutKey]?.name || '') : 'Управление упражнениями'"></h1>
    </div>
    
    <template x-if="!managingWorkoutKey">
      <div class="space-y-2">
        <template x-for="w in workoutList" :key="w.key">
          <button type="button" @click="selectWorkoutToManage(w.key)" class="w-full flex items-center gap-3 p-4 rounded-xl bg-gray-800 hover:bg-gray-700">
            <span class="text-2xl" x-text="w.emoji"></span>
            <div class="flex-1 text-left">
              <p class="font-bold" x-text="w.name"></p>
              <p class="text-sm text-gray-400" x-text="(w.exercises?.length || 0) + ' упражнений'"></p>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </template>
      </div>
    </template>
    
    <template x-if="managingWorkoutKey && editingExerciseIndex === -1">
      <div>
        <div class="space-y-2 mb-4" :data-ver="inactiveVersion">
          <template x-for="(ex, i) in (workouts[managingWorkoutKey]?.exercises || [])" :key="ex.id + '_' + (inactiveVersion || 0)">
            <div 
              draggable="true"
              @dragstart="onDragStart($event, i)"
              @dragover.prevent="onDragOver($event, i)"
              @drop="onDrop($event, i, 'manage')"
              @dragend="onDragEnd()"
              class="flex items-center gap-3 p-3 rounded-xl transition-opacity cursor-move"
              :class="{
                'bg-gray-800 opacity-60': isExerciseInactive(managingWorkoutKey, ex.id),
                'bg-gray-800 opacity-50': dragState.dragging === i,
                'bg-gray-800': !isExerciseInactive(managingWorkoutKey, ex.id) && dragState.dragging !== i
              }"
            >
              <div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center shrink-0" x-html="getExerciseIcon(ex.icon)"></div>
              <div class="flex-1 min-w-0">
                <p class="font-medium" x-text="ex.name"></p>
                <p class="text-xs text-gray-400" x-text="(ex.sets || 3) + '×' + (ex.reps || 12)"></p>
              </div>
              <label class="flex items-center gap-1 shrink-0 cursor-pointer" title="Нет в моем зале" @click.stop>
                <input type="checkbox" :checked="isExerciseInactive(managingWorkoutKey, ex.id)" @change="toggleExerciseInactive(managingWorkoutKey, ex.id)" class="rounded">
                <i data-lucide="eye-off" class="w-4 h-4 text-gray-500"></i>
              </label>
              <button type="button" @click.stop="startEditExercise(i)" class="p-2 hover:bg-gray-600 rounded-lg"><i data-lucide="pencil" class="w-4 h-4"></i></button>
              <button type="button" @click.stop="deleteExerciseFromTemplate(i)" class="p-2 hover:bg-red-500/30 rounded-lg text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </template>
        </div>
        <button type="button" @click="startAddExercise()" class="w-full py-3 rounded-xl bg-blue-500 hover:bg-blue-600 font-semibold flex items-center justify-center gap-2">
          <i data-lucide="plus" class="w-5 h-5"></i>
          Добавить упражнение
        </button>
      </div>
    </template>
    
    <template x-if="managingWorkoutKey && editingExerciseIndex !== -1">
      <div class="bg-gray-800 rounded-2xl p-4">
        <p class="text-sm text-gray-400 mb-3" x-text="editingExerciseIndex >= 0 ? 'Редактировать' : 'Новое упражнение'"></p>
        <div class="space-y-3">
          <div>
            <label class="text-sm text-gray-400">Название</label>
            <input type="text" x-model="exerciseForm.name" class="w-full bg-gray-700 rounded-lg p-3 mt-1" placeholder="Жим лёжа">
          </div>
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="text-sm text-gray-400">Сеты</label>
              <input type="number" min="1" x-model.number="exerciseForm.sets" class="w-full bg-gray-700 rounded-lg p-3 mt-1">
            </div>
            <div class="flex-1">
              <label class="text-sm text-gray-400">Повторения</label>
              <input type="number" min="1" x-model.number="exerciseForm.reps" class="w-full bg-gray-700 rounded-lg p-3 mt-1">
            </div>
          </div>
          <div>

                <p class="text-xs text-gray-400 truncate">

          <div>
            <template x-if="!isInlineVideoOpen(bankSelectedId)">
              <button type="button"
                      @click="toggleInlineVideo(bankSelectedId)"
                      class="block w-full bg-red-500/20 hover:bg-red-500/30 border border-red-500/40 rounded-xl p-3 text-center">
                <i data-lucide="play-circle" class="w-6 h-6 inline text-red-400 mr-2"></i>
                <span class="font-semibold text-red-200">Смотреть видео</span>
              </button>
            </template>
            <template x-if="isInlineVideoOpen(bankSelectedId)">
              <div class="bg-black rounded-xl overflow-hidden">
                <div class="flex items-center justify-between px-3 py-2 bg-gray-900/80">
                  <span class="text-sm text-gray-300">Видео упражнения</span>
                  <button type="button" @click="closeInlineVideo()"
                          class="p-1 hover:bg-gray-700 rounded">
                    <i data-lucide="x" class="w-4 h-4"></i>
                  </button>
                </div>
                <div class="relative" style="padding-bottom: 56.25%; height: 0;">
                  <iframe :src="getExerciseEmbedUrl(getSelectedExercise())"
                          class="absolute inset-0 w-full h-full"
                          allow="autoplay; encrypted-media; picture-in-picture"
                          allowfullscreen
                          referrerpolicy="strict-origin-when-cross-origin"></iframe>
                </div>
              </div>
            </template>
          </div>
        </template>

        <template x-if="!getExerciseEmbedUrl(getSelectedExercise()) && getExerciseSearchUrl(getSelectedExercise())">
          <a :href="getExerciseSearchUrl(getSelectedExercise())" target="_blank" rel="noopener"
             class="block bg-gray-700 hover:bg-gray-600 rounded-xl p-3 text-center text-sm text-gray-300">
            <i data-lucide="search" class="w-4 h-4 inline mr-2"></i>
            Найти видео на YouTube
          </a>
        </template>

        <div class="bg-gray-800 rounded-xl p-4">
          <dl class="grid grid-cols-2 gap-y-3 text-sm">
            <dt class="text-gray-400">Тип</dt>
            <dd x-text="formatExerciseType(getSelectedExercise().type)"></dd>
            <dt class="text-gray-400">Оборудование</dt>
            <dd x-text="formatEquipment(getSelectedExercise().equipment)"></dd>
            <dt class="text-gray-400">Мышцы</dt>
            <dd x-text="(getSelectedExercise().muscles || []).map(m => formatMuscle(m)).join(', ')"></dd>
            <dt class="text-gray-400">Шаг прогрессии</dt>
            <dd>
              <span x-show="getSelectedExercise().stepKg" x-text="'+' + getSelectedExercise().stepKg + ' кг'"></span>
              <span x-show="getSelectedExercise().stepReps" x-text="'+' + getSelectedExercise().stepReps + ' повт'"></span>
              <span x-show="getSelectedExercise().stepTimeSec" x-text="'+' + getSelectedExercise().stepTimeSec + ' сек'"></span>
            </dd>
            <dt class="text-gray-400">Отдых по умолчанию</dt>
            <dd x-text="getSelectedExercise().defaultRest + ' сек'"></dd>
            <dt class="text-gray-400">Уровень</dt>
            <dd x-text="getSelectedExercise().level || '—'"></dd>
            <dt class="text-gray-400">Плечо</dt>
            <dd x-text="getSelectedExercise().shoulderFriendly ? 'безопасно' : 'осторожно'"></dd>
          </dl>
        </div>

        <template x-if="(getSelectedExercise().alts || []).length > 0">
          <div class="bg-gray-800 rounded-xl p-4">
            <h4 class="text-sm text-gray-400 uppercase tracking-wide mb-2">Альтернативы</h4>
            <div class="space-y-1">
              <template x-for="altId in getSelectedExercise().alts" :key="altId">
                <button type="button"
                        @click="selectBankExercise(altId)"
                        class="w-full text-left bg-gray-700/50 hover:bg-gray-700 rounded-lg px-3 py-2 text-sm">
                  → <span x-text="(window.EXERCISE_BY_ID || {})[altId]?.name || altId"></span>
                </button>
              </template>
            </div>
          </div>
        </template>

        <!-- Override videoUrl -->

          <input type="url"
                 :value="getSelectedExercise().videoUrl || ''"
                 @change="saveExerciseVideoOverride(getSelectedExercise().id, $event.target.value)"
                 placeholder="https://www.youtube.com/watch?v=..."
                 class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm placeholder-gray-500" />
        </div>
      </div>
    </template>
  </div>

  <!-- ========== v2 СТРАНИЦА: ТРЕКЕРЫ ========== -->
  <template x-if="page === 'trackers'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-4">
      <button type="button"
              @click="trackerSelectedId ? (trackerSelectedId = null) : (page = 'dashboard')"
              class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold flex-1"
          x-text="trackerSelectedId ? (getSelectedTracker()?.name || 'Трекер') : 'Трекеры'"></h1>
      <template x-if="!trackerSelectedId">
        <button type="button"
                @click="showNewTrackerForm = !showNewTrackerForm"
                class="p-2 hover:bg-gray-800 rounded-lg" title="Новый трекер">
          <i data-lucide="plus" class="w-5 h-5"></i>
        </button>
      </template>
    </div>

    <!-- Список трекеров -->
    <template x-if="!trackerSelectedId">
      <div>
        <!-- Форма создания -->
        <template x-if="showNewTrackerForm">
          <div class="bg-gray-800 rounded-2xl p-4 mb-4 border border-amber-500/40">
            <p class="text-sm text-gray-300 mb-3">Новая привычка</p>
            <input type="text" x-model="newTrackerForm.name" placeholder="Например: Подтягивания"
                   class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm mb-2" />
            <div class="grid grid-cols-2 gap-2 mb-3">
              <select x-model="newTrackerForm.type" class="bg-gray-700 rounded-lg px-2 py-2 text-sm">
                <option value="daily_binary">Сделал/нет</option>
                <option value="daily_count">С количеством</option>
              </select>
              <input type="text" x-model="newTrackerForm.icon" maxlength="2"
                     class="bg-gray-700 rounded-lg px-2 py-2 text-sm text-center" placeholder="✅" />
            </div>
            <div class="flex gap-2">
              <button type="button" @click="createTrackerFromForm()"
                      class="flex-1 bg-amber-500 hover:bg-amber-600 text-gray-900 font-semibold rounded-lg py-2 text-sm">
                Создать
              </button>
              <button type="button" @click="showNewTrackerForm = false"
                      class="px-4 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm">
                Отмена
              </button>
            </div>
            <p class="text-[10px] text-gray-500 mt-2">
              Примеры: «Подтягивания» (с количеством), «Зарядка 5 мин» (сделал/нет), «Растяжка», «Прогулка».
            </p>
          </div>
        </template>

        <template x-if="trackersList.length === 0 && !showNewTrackerForm">
          <div class="bg-gray-800 rounded-2xl p-6 text-center text-gray-400">
            <i data-lucide="target" class="w-10 h-10 inline mb-2 text-amber-400/60"></i>
            <p class="text-sm">Нет трекеров. Нажми «+» вверху, чтобы создать первый.</p>
            <p class="text-xs text-gray-500 mt-2">
              Трекеры — для ежедневных привычек: подтягивания, зарядка, растяжка, прогулки.
              Виден стрик и карта года.
            </p>
          </div>
        </template>

        <div class="space-y-2">
          <template x-for="t in trackersList" :key="t.id">
            <div class="bg-gray-800 rounded-2xl p-3 border"
                 :class="isTrackerDoneToday(t) ? 'border-amber-500/50' : 'border-gray-700'">
              <div class="flex items-center gap-3">
                <button type="button"
                        @click="t.type === 'daily_count' ? incrementTracker(t.id, 1) : markTrackerToday(t.id)"
                        class="w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0 transition-colors"
                        :class="isTrackerDoneToday(t) ? 'bg-amber-500 text-gray-900' : 'bg-gray-700 hover:bg-gray-600'">
                  <span x-text="t.icon || '✅'"></span>
                </button>
                <button type="button" @click="openTracker(t.id)"
                        class="flex-1 text-left min-w-0">
                  <p class="font-semibold truncate" x-text="t.name"></p>
                  <p class="text-xs text-gray-400">
                    🔥 <span x-text="getTrackerStreak(t)"></span> дней ·
                    <span x-text="getTrackerTotal(t)"></span> всего
                    <template x-if="t.type === 'daily_count'">
                      <span> · сегодня <span x-text="getTrackerTodayValue(t) || 0"></span></span>
                    </template>
                  </p>
                </button>
                <template x-if="t.type === 'daily_count'">
                  <div class="flex flex-col gap-1 shrink-0">
                    <button type="button" @click="incrementTracker(t.id, 1)"
                            class="w-7 h-7 bg-gray-700 hover:bg-gray-600 rounded text-xs">+</button>
                    <button type="button" @click="incrementTracker(t.id, -1)"
                            class="w-7 h-7 bg-gray-700 hover:bg-gray-600 rounded text-xs">−</button>
                  </div>
                </template>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Деталь трекера -->
    <template x-if="trackerSelectedId && getSelectedTracker()">
      <div class="space-y-4">
        <!-- Статистика -->
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-gray-800 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400">Стрик</p>
            <p class="text-2xl font-bold text-amber-400" x-text="getTrackerStreak(getSelectedTracker())"></p>
          </div>
          <div class="bg-gray-800 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400">Лучший</p>
            <p class="text-2xl font-bold text-emerald-400" x-text="getTrackerBest(getSelectedTracker())"></p>
          </div>
          <div class="bg-gray-800 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400">Всего</p>
            <p class="text-2xl font-bold" x-text="getTrackerTotal(getSelectedTracker())"></p>
          </div>
        </div>

        <template x-if="getSelectedTracker().type === 'daily_count'">
          <div class="bg-gray-800 rounded-xl p-3 text-center">
            <p class="text-xs text-gray-400">Суммарное количество</p>
            <p class="text-3xl font-bold text-amber-300" x-text="getTrackerTotalCount(getSelectedTracker())"></p>
          </div>
        </template>

        <!-- Кнопка отметки -->
        <div class="flex gap-2">
          <button type="button"
                  @click="getSelectedTracker().type === 'daily_count' ? incrementTracker(trackerSelectedId, 1) : markTrackerToday(trackerSelectedId)"
                  class="flex-1 bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold rounded-xl py-3">
            <span x-show="getSelectedTracker().type === 'daily_count'">+1 сегодня</span>
            <span x-show="getSelectedTracker().type !== 'daily_count'"
                  x-text="isTrackerDoneToday(getSelectedTracker()) ? 'Отменить сегодня' : 'Отметить сегодня'"></span>
          </button>
          <template x-if="getSelectedTracker().type === 'daily_count'">
            <button type="button"
                    @click="incrementTracker(trackerSelectedId, -1)"
                    class="px-4 bg-gray-700 hover:bg-gray-600 rounded-xl">
              −1
            </button>
          </template>
        </div>

        <div class="bg-gray-800 rounded-xl p-3">
          <p class="text-xs text-gray-400 uppercase tracking-wide mb-2">Бейджи</p>
          <div class="flex flex-wrap gap-2">
            <template x-for="b in [7,30,100,365,730]" :key="b">
              <div class="px-3 py-1 rounded-full text-xs font-semibold"
                   :class="getTrackerBadges(getSelectedTracker()).includes(b) ?
                           'bg-amber-500/30 text-amber-200' : 'bg-gray-700 text-gray-500'">
                <span x-show="getTrackerBadges(getSelectedTracker()).includes(b)">🏆 </span>
                <span x-text="b"></span> дн
              </div>
            </template>
          </div>
          <template x-if="getTrackerNextBadge(getSelectedTracker())">
            <p class="text-xs text-gray-500 mt-2">
              До следующего бейджа:
              <span class="text-amber-300 font-semibold"
                    x-text="(getTrackerNextBadge(getSelectedTracker()) - getTrackerTotal(getSelectedTracker())) + ' дн'"></span>
            </p>
          </template>
        </div>

        <!-- Карта года -->
        <div class="bg-gray-800 rounded-xl p-3 overflow-x-auto">
          <p class="text-xs text-gray-400 uppercase tracking-wide mb-2">Год</p>
          <div class="grid gap-[2px]"
               style="grid-template-columns: repeat(53, minmax(10px, 1fr)); grid-auto-flow: column; grid-template-rows: repeat(7, 10px);">
            <template x-for="cell in getTrackerYearGrid(getSelectedTracker())" :key="cell.dateKey">
              <div class="rounded-[2px]" style="width: 10px; height: 10px;"
                   :class="{
                     'bg-gray-700': cell.intensity === 0,
                     'bg-amber-900': cell.intensity === 1,
                     'bg-amber-700': cell.intensity === 2,
                     'bg-amber-500': cell.intensity === 3,
                     'bg-amber-300': cell.intensity === 4,
                   }"
                   :title="cell.dateKey + (cell.value ? ' · ' + cell.value : '')"></div>
            </template>
          </div>
          <p class="text-[10px] text-gray-500 mt-2">365 дней назад → сегодня</p>
        </div>

        <!-- Удалить -->
        <button type="button"
                @click="deleteTrackerConfirm(trackerSelectedId)"
                class="w-full bg-red-500/15 hover:bg-red-500/25 text-red-300 rounded-xl py-2 text-sm">
          Удалить трекер
        </button>
      </div>
    </template>
  </div>
  </template>

              @click="progressExerciseId ? (progressExerciseId = null) : (page = 'dashboard')"

        <i data-lucide="chevron-left" class="w-6 h-6"></i>

                <template x-if="(ex.type === 'time_only' || ex.type === 'weighted_time') && ex.last">

                <p class="text-[10px] text-gray-500">последний рекорд</p>

        <!-- График по основной метрике -->

            <p class="text-sm font-semibold mb-2">Тоннаж (вес × повторы), кг</p>
            <svg viewBox="0 0 300 130" class="w-full" preserveAspectRatio="none" style="height: 140px;">
              <path :d="buildChart(getExerciseSessionData(progressExerciseId), 'tonnage').pathD"

                <circle :cx="p.x" :cy="p.y" r="2.5" fill="#6ee7b7" />

  <!-- Lucide Icons init -->
  <script>
    document.addEventListener('alpine:initialized', () => {
      console.log('Alpine initialized, creating icons...');
      lucide.createIcons();

      // Узкий observer: триггерим createIcons ТОЛЬКО когда в DOM добавляется
      // элемент с data-lucide. Это избавляет от каскадных перерисовок
      // (createIcons меняет DOM → observer → createIcons → …) и лагов кликов.
      var createIconsTimer;
      function hasLucideNode(node) {
        if (!node || node.nodeType !== 1) return false;
        if (node.hasAttribute && node.hasAttribute('data-lucide')) return true;
        return !!(node.querySelector && node.querySelector('[data-lucide]'));
      }
      const observer = new MutationObserver((mutations) => {
        for (const m of mutations) {
          for (const node of m.addedNodes) {
            if (hasLucideNode(node)) {
              clearTimeout(createIconsTimer);
              createIconsTimer = setTimeout(() => lucide.createIcons(), 80);
              return;
            }
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });
  </script>
  
  <!-- Register Service Worker + видимый механизм обновления -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((reg) => {
          console.log('SW registered:', reg.scope);

          // Явная проверка обновлений при каждом запуске (важно для iOS PWA)
          reg.update().catch(() => {});
          // Периодическая проверка пока страница открыта
          setInterval(() => reg.update().catch(() => {}), 5 * 60 * 1000);

          function notifyUpdateAvailable() {
            document.dispatchEvent(new CustomEvent('app-update-available'));
          }

          // Если есть уже ожидающий SW — сразу показываем банер
          if (reg.waiting && navigator.serviceWorker.controller) notifyUpdateAvailable();

          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                // Есть новая версия, готова к активации
                notifyUpdateAvailable();
              }
            });
          });
        }).catch((err) => console.warn('SW registration failed:', err));

        // Перезагружаем страницу когда новый SW взял управление
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
