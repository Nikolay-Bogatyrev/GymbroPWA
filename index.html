<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <script>
    if (location.hostname.includes('github.io')) {
      var base = document.createElement('base');
      base.href = '/GymbroPWA/';
      document.head.insertBefore(base, document.head.firstChild);
    }
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>GymBro</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              900: '#111827',
              800: '#1f2937',
              700: '#374151',
              600: '#4b5563',
              500: '#6b7280',
              400: '#9ca3af',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-900 text-white min-h-screen" x-data="gymTracker()" x-init="init()">

  <!-- ========== СТРАНИЦА: DASHBOARD ========== -->
  <template x-if="page === 'dashboard'">
  <div class="min-h-screen p-4 pb-24">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold">GymBro</h1>
        <p class="text-gray-400 text-sm">Привет, <span x-text="profile.name"></span>! 👋</p>
      </div>
      <div class="text-right">
        <p class="text-sm text-gray-400">Стрик</p>
        <p class="text-2xl font-bold text-orange-400 flex items-center gap-1">
          <i data-lucide="flame" class="w-5 h-5"></i>
          <span x-text="stats.streak"></span>
        </p>
      </div>
    </div>

    <!-- Week Progress Card -->
    <div class="bg-gray-800 rounded-2xl p-4 mb-4">
      <div class="flex justify-between items-center mb-3">
        <span class="text-gray-400">Эта неделя</span>
        <span class="text-lg font-semibold">
          <span x-text="stats.weekCompleted"></span>/<span x-text="stats.weekTotal"></span>
        </span>
      </div>
      
      <!-- Week days (тап — отметить тренировку: прогулка, зал и т.д.) -->
      <div class="flex gap-1 mb-3">
        <template x-for="(day, index) in getWeekDaysStatus()" :key="day.dayName + day.dateStr">
          <div class="flex-1 text-center">
            <button
              type="button"
              @click="markDayAsWorkout(day)"
              :disabled="!day.canMark"
              :title="day.canMark ? (day.completed ? 'День с тренировкой' : 'Отметить тренировку (прогулка, зал)') : ''"
              class="w-full h-10 rounded-lg mb-1 flex items-center justify-center transition-colors disabled:cursor-default"
              :class="{
                'bg-green-500 hover:bg-green-600 active:scale-95 cursor-pointer': day.completed && day.canMark,
                'bg-blue-500 animate-pulse hover:bg-blue-600 active:scale-95 cursor-pointer': day.isToday && !day.completed && day.canMark,
                'bg-gray-700 hover:bg-gray-600 active:scale-95 cursor-pointer': day.canMark && !day.completed && !day.isToday,
                'bg-gray-700 cursor-default': !day.canMark
              }"
            >
              <i x-show="day.completed" data-lucide="check" class="w-5 h-5"></i>
              <i x-show="day.canMark && !day.completed" data-lucide="plus" class="w-4 h-4 opacity-70"></i>
            </button>
            <span class="text-xs text-gray-500" x-text="day.dayName"></span>
          </div>
        </template>
      </div>
      
      <!-- Stats row -->
      <div class="flex justify-between text-sm">
        <div class="text-center">
          <p class="text-gray-400">Кардио</p>
          <p class="font-semibold text-blue-400"><span x-text="stats.cardioMinutes"></span> мин</p>
        </div>
        <div class="text-center">
          <p class="text-gray-400">Настроение</p>
          <p class="font-semibold text-green-400">⌀ <span x-text="(stats.avgMood ?? 0).toFixed(1)"></span></p>
        </div>
      </div>
    </div>

    <!-- HR Zones Card -->
    <div class="bg-gradient-to-r from-red-900/50 to-orange-900/50 rounded-2xl p-4 mb-4 border border-red-700/50">
      <div class="flex items-center gap-2 mb-2">
        <i data-lucide="heart" class="w-5 h-5 text-red-400"></i>
        <span class="font-semibold">Пульсовые зоны</span>
        <span class="text-xs text-gray-400 ml-auto">Возраст: <span x-text="profile.age"></span></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Макс ЧСС</p>
          <p class="text-xl font-bold text-red-400" x-text="profile.maxHR"></p>
        </div>
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Жиросжигание</p>
          <p class="text-xl font-bold text-orange-400">
            <span x-text="profile.fatBurnLow"></span>-<span x-text="profile.fatBurnHigh"></span>
          </p>
        </div>
        <div class="bg-gray-800/50 rounded-lg p-2">
          <p class="text-xs text-gray-400">Интервал</p>
          <p class="text-xl font-bold text-yellow-400">
            <span x-text="profile.intervalLow"></span>-<span x-text="profile.intervalHigh"></span>
          </p>
        </div>
      </div>
    </div>

    <!-- Start Workout Button -->
    <button
      type="button"
      @click="page = 'select-workout'"
      class="w-full bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl p-5 mb-4 flex items-center justify-between shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-transform"
    >
      <div class="flex items-center gap-3">
        <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center">
          <i data-lucide="dumbbell" class="w-8 h-8"></i>
        </div>
        <div class="text-left">
          <p class="font-bold text-lg">Начать тренировку</p>
          <p class="text-blue-200 text-sm" x-text="getTodayPlan()"></p>
        </div>
      </div>
      <i data-lucide="chevron-right" class="w-6 h-6"></i>
    </button>

    <!-- v2: Programs + Bank nav -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <button
        type="button"
        @click="goPrograms()"
        class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-4 flex flex-col items-start gap-2 active:scale-[0.98] transition-transform border border-gray-700"
      >
        <div class="w-10 h-10 bg-emerald-500/20 rounded-lg flex items-center justify-center">
          <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-400"></i>
        </div>
        <div class="text-left">
          <p class="font-semibold">Программы</p>
          <p class="text-xs text-gray-400" x-text="activeProgram ? activeProgram.name : 'Не выбрана'"></p>
        </div>
      </button>
      <button
        type="button"
        @click="goBank()"
        class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-4 flex flex-col items-start gap-2 active:scale-[0.98] transition-transform border border-gray-700"
      >
        <div class="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center">
          <i data-lucide="library" class="w-5 h-5 text-indigo-400"></i>
        </div>
        <div class="text-left">
          <p class="font-semibold">Банк упражнений</p>
          <p class="text-xs text-gray-400"><span x-text="(window.EXERCISE_BANK||[]).length"></span> упражнений</p>
        </div>
      </button>
    </div>

    <!-- v2: Сегодня по программе -->
    <template x-if="todayPlanV2">
      <div class="bg-gray-800 rounded-2xl p-4 mb-4 border border-gray-700">
        <div class="flex items-center gap-2 mb-2">
          <i data-lucide="target" class="w-5 h-5 text-emerald-400"></i>
          <span class="font-semibold">Сегодня по программе</span>
        </div>
        <template x-if="todayPlanV2.isRest">
          <p class="text-gray-400 text-sm">День отдыха. Можешь отметить прогулку или сделать лёгкую зарядку.</p>
        </template>
        <template x-if="!todayPlanV2.isRest && todayPlanV2.template">
          <button
            type="button"
            @click="openTemplate(todayPlanV2.template.id)"
            class="w-full text-left flex items-center justify-between"
          >
            <div>
              <p class="font-semibold" x-text="todayPlanV2.template.name"></p>
              <p class="text-xs text-gray-400">
                <span x-text="todayPlanV2.template.items.length"></span> упражнений · ≈
                <span x-text="todayPlanV2.template.estimatedMinutes"></span> мин
              </p>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400"></i>
          </button>
        </template>
      </div>
    </template>

    <!-- Recent Workouts -->
    <div class="bg-gray-800 rounded-2xl p-4">
      <h3 class="font-semibold mb-3 flex items-center gap-2">
        <i data-lucide="calendar" class="w-5 h-5 text-gray-400"></i>
        Последние тренировки
      </h3>
      <div class="space-y-2">
        <template x-for="workout in recentWorkouts" :key="workout.id">
          <div class="flex items-center gap-3 bg-gray-700/50 rounded-xl p-3">
            <div 
              class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
              :class="getWorkoutTypeColor(workout.type)"
            >
              <i :data-lucide="workout.type === 'cardio' ? 'activity' : 'dumbbell'" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-medium" x-text="workout.name"></p>
              <p class="text-sm text-gray-400" x-text="workout.date"></p>
            </div>
            <div class="text-right shrink-0">
              <p class="text-lg" x-text="getMoodEmoji(workout.mood)"></p>
              <p class="text-xs text-gray-400"><span x-text="workout.mood ?? workout.moodPost ?? 7"></span>/10</p>
            </div>
            <div class="flex gap-1 shrink-0">
              <button
                type="button"
                @click="editWorkout(workout)"
                class="p-2 hover:bg-gray-600 rounded-lg"
                title="Редактировать"
              >
                <i data-lucide="pencil" class="w-4 h-4"></i>
              </button>
              <button
                type="button"
                @click="deleteWorkout(workout.id)"
                class="p-2 hover:bg-red-500/30 rounded-lg text-red-400"
                title="Удалить"
              >
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: SELECT WORKOUT ========== -->
  <template x-if="page === 'select-workout'">
  <div class="min-h-screen p-4">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <button type="button" @click="page = 'dashboard'" class="p-2 hover:bg-gray-800 rounded-lg">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-xl font-bold">Выбери тренировку</h1>
      </div>
      <button type="button" @click="openManageExercises()" class="p-2 hover:bg-gray-800 rounded-lg" title="Управление упражнениями">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- Debug info (убрать после отладки) -->
    <div class="text-xs text-gray-500 mb-4">
      workoutList length: <span x-text="workoutList.length"></span>
    </div>

    <!-- Workout Cards -->
    <div class="space-y-3">
      <template x-for="workout in workoutList" :key="workout.key">
        <button
          type="button"
          @click="planWorkoutKey = workout.key; page = 'workout-plan'"
          class="w-full rounded-2xl p-4 flex items-center gap-4 shadow-lg active:scale-[0.98] transition-transform"
          :class="workout.gradient"
        >
          <div class="w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center p-2">
            <div x-html="getExerciseIcon(workout.exercises[0]?.icon || 'dumbbell')"></div>
          </div>
          <div class="flex-1 text-left">
            <p class="text-2xl mb-1" x-text="workout.emoji"></p>
            <p class="font-bold text-lg" x-text="workout.name"></p>
            <p class="text-white/70 text-sm">
              <span x-text="workout.exercises.length"></span> упражнений + 
              <span x-text="workout.cardio"></span> мин кардио
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-6 h-6"></i>
        </button>
      </template>

      <!-- Cardio Only -->
      <button
        type="button"
        @click="isCardioOnly = true; page = 'cardio'; saveSession()"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-600 rounded-2xl p-4 flex items-center gap-4 shadow-lg active:scale-[0.98] transition-transform"
      >
        <div class="w-16 h-16 bg-white/20 rounded-xl flex items-center justify-center p-2">
          <div x-html="getExerciseIcon('treadmill')"></div>
        </div>
        <div class="flex-1 text-left">
          <p class="text-2xl mb-1">🏃</p>
          <p class="font-bold text-lg">Только кардио</p>
          <p class="text-white/70 text-sm">Пн/Ср/Пт — 45-60 минут</p>
        </div>
        <i data-lucide="chevron-right" class="w-6 h-6"></i>
      </button>
    </div>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: ПЛАН ТРЕНИРОВКИ ========== -->
  <template x-if="page === 'workout-plan'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="page = 'select-workout'; planWorkoutKey = null" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="workouts[planWorkoutKey]?.name || 'План тренировки'"></h1>
    </div>
    <template x-if="planWorkoutKey">
      <div>
        <div class="space-y-2 mb-6" :data-ver="inactiveVersion">
          <template x-for="(ex, i) in (workouts[planWorkoutKey]?.exercises || [])" :key="ex.id + '_' + (inactiveVersion || 0)">
            <div 
              draggable="true"
              @dragstart="onDragStart($event, i)"
              @dragover.prevent="onDragOver($event, i)"
              @drop="onDrop($event, i, 'plan')"
              @dragend="onDragEnd()"
              class="flex items-center gap-3 p-3 rounded-xl transition-opacity cursor-move"
              :class="{
                'bg-gray-800 opacity-60': isExerciseInactive(planWorkoutKey, ex.id),
                'bg-gray-800 opacity-50': dragState.dragging === i,
                'bg-gray-800': !isExerciseInactive(planWorkoutKey, ex.id) && dragState.dragging !== i
              }"
            >
              <div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center shrink-0" x-html="getExerciseIcon(ex.icon)"></div>
              <div class="flex-1 min-w-0">
                <p class="font-medium" x-text="ex.name"></p>
                <p class="text-xs text-gray-400" x-text="(ex.sets || 3) + '×' + (ex.reps || 12)"></p>
              </div>
              <label class="flex items-center gap-2 shrink-0 cursor-pointer" @click.stop>
                <input type="checkbox" :checked="isExerciseInactive(planWorkoutKey, ex.id)" @change="toggleExerciseInactive(planWorkoutKey, ex.id)" class="rounded">
                <span class="text-xs text-gray-500">Нет в зале</span>
              </label>
            </div>
          </template>
        </div>
        <button
          type="button"
          @click="startWorkoutFromPlan()"
          class="w-full py-4 rounded-xl bg-blue-500 hover:bg-blue-600 font-bold text-lg"
        >
          Начать тренировку
        </button>
      </div>
    </template>
  </div>
  </template>

  <!-- ========== СТРАНИЦА: WORKOUT ========== -->
  <template x-if="page === 'workout'">
  <div class="min-h-screen pb-32">
    
    <!-- Header -->
    <div 
      class="p-4"
      :class="currentWorkout?.gradient || 'bg-gradient-to-r from-blue-500 to-blue-600'"
    >
      <div class="flex items-center justify-between mb-2">
        <button type="button" @click="page = 'select-workout'" class="p-2 hover:bg-white/20 rounded-lg">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <div class="text-center">
          <p class="text-sm opacity-80" x-text="currentWorkout?.name"></p>
          <p class="font-bold">
            <span x-text="currentExerciseIndex + 1"></span> / 
            <span x-text="currentWorkout?.exercises.length"></span>
          </p>
        </div>
        <button type="button" @click="page = 'complete'" class="p-2 hover:bg-white/20 rounded-lg text-sm">
          Завершить
        </button>
      </div>
      
      <!-- Progress bar -->
      <div class="h-2 bg-white/20 rounded-full overflow-hidden">
        <div 
          class="h-full bg-white transition-all duration-300"
          :style="`width: ${((currentExerciseIndex + 1) / (currentWorkout?.exercises.length || 1)) * 100}%`"
        ></div>
      </div>
    </div>

    <!-- Exercise Card -->
    <div class="p-4">
      <div class="bg-gray-800 rounded-2xl p-4 mb-4">
        <div class="flex items-start gap-4 mb-4">
          <div class="w-20 h-20 bg-gray-700 rounded-xl p-2">
            <div x-html="getExerciseIcon(currentExercise?.icon)"></div>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <h2 class="font-bold text-lg" x-text="(selectedAlt?.name || selectedAlt) || currentExercise?.name"></h2>
              <button
                type="button"
                x-show="getCurrentVideoUrl()"
                @click="openVideoModal()"
                class="p-1.5 rounded-lg bg-blue-500/30 hover:bg-blue-500/50 text-blue-400"
                title="Смотреть видео"
              >
                <i data-lucide="play" class="w-4 h-4"></i>
              </button>
            </div>
            <p class="text-gray-400">
              <span x-text="currentExercise?.sets"></span>×<span x-text="currentExercise?.reps"></span>
            </p>
            <p 
              x-show="currentExercise?.lastWeight !== 0"
              class="text-sm text-blue-400 flex items-center gap-1 mt-1"
            >
              <i data-lucide="trending-up" class="w-4 h-4"></i>
              Прошлый раз: <span x-text="currentExercise?.lastWeight"></span> кг
            </p>
          </div>
        </div>

        <!-- Alternatives Toggle -->
        <button
          type="button"
          @click="showAlternatives = !showAlternatives"
          class="w-full text-left text-sm text-gray-400 flex items-center gap-2 mb-2"
        >
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
          <span x-text="showAlternatives ? 'Скрыть альтернативы' : `Альтернативы (${currentExercise?.alts?.length || 0})`"></span>
        </button>
        
        <!-- Alternatives List -->
        <div x-show="showAlternatives" x-transition class="space-y-2 mb-4">
          <template x-for="(alt, i) in currentExercise?.alts" :key="i">
            <button
              type="button"
              @click="selectedAlt = (selectedAlt === alt ? null : alt); showAlternatives = false"
              class="w-full text-left p-2 rounded-lg text-sm transition-colors"
              :class="selectedAlt === alt ? 'bg-blue-500/30 border border-blue-500' : 'bg-gray-700'"
            >
              <span x-text="alt.name || alt"></span>
              <span x-show="alt.forWhat" class="text-gray-500 block text-xs mt-0.5" x-text="'→ ' + alt.forWhat"></span>
            </button>
          </template>
          <button
            type="button"
            x-show="selectedAlt"
            @click="selectedAlt = null"
            class="w-full text-left p-2 rounded-lg text-sm bg-gray-700"
          >
            ← Вернуть основное
          </button>
        </div>
      </div>

      <!-- Completed Sets -->
      <div x-show="currentExerciseSets.length > 0" class="mb-4">
        <p class="text-sm text-gray-400 mb-2">Записанные подходы:</p>
        <div class="flex flex-wrap gap-2">
          <template x-for="(set, i) in currentExerciseSets" :key="i">
            <div class="bg-green-500/20 border border-green-500/50 rounded-lg px-3 py-2 text-sm">
              <span class="text-green-400 font-semibold" x-text="set.weight + ' кг'"></span>
              <span class="text-gray-400"> × </span>
              <span x-text="set.reps"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Input Form -->
      <div class="bg-gray-800 rounded-2xl p-4">
        <p class="text-center text-gray-400 mb-4">
          Подход <span x-text="currentExerciseSets.length + 1"></span>
        </p>
        
        <!-- Weight Input -->
        <div class="mb-6">
          <p class="text-sm text-gray-400 text-center mb-2">Вес (кг)</p>
          <div class="flex items-center justify-center gap-4">
            <button
              type="button"
              @click="currentWeight = Math.max(0, currentWeight - 2)"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="minus" class="w-6 h-6"></i>
            </button>
            <div class="w-24 text-center">
              <p class="text-4xl font-bold" x-text="currentWeight"></p>
            </div>
            <button
              type="button"
              @click="currentWeight += 2"
              class="w-14 h-14 bg-gray-700 rounded-xl flex items-center justify-center active:bg-gray-600"
            >
              <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
          </div>
        </div>

        <!-- Reps Input -->
        <div class="mb-6">
          <p class="text-sm text-gray-400 text-center mb-2">Повторения</p>
          <div class="flex items-center justify-center gap-4">
            <button
              type="button"
              @click="currentReps = Math.max(1, currentReps - 1)"

        <template x-for="w in workoutList" :key="w.key">

          <!-- Неделя -->
          <div class="grid grid-cols-7 gap-1">
            <template x-for="d in getProgramWeekDays(p)" :key="d.key">
              <button type="button"
                      @click="d.templateId && openTemplate(d.templateId)"
                      class="rounded-lg p-2 text-center text-xs transition-colors"
                      :class="d.templateId ? 'bg-emerald-500/20 hover:bg-emerald-500/30 cursor-pointer' : 'bg-gray-700/50 cursor-default'">
                <p class="text-gray-300 font-semibold" x-text="d.label"></p>
                <p class="text-[10px] text-gray-400 truncate"
                   x-text="d.templateId ? getTemplateNameById(d.templateId).replace('Full Body ', 'FB ') : 'отдых'"></p>
              </button>
            </template>
          </div>
        </div>
      </template>
    </div>

    <h3 class="text-sm text-gray-400 uppercase tracking-wide mb-2">Шаблоны</h3>
    <div class="space-y-2">
      <template x-for="t in templates" :key="t.id">
        <button type="button"
                @click="openTemplate(t.id)"
                class="w-full bg-gray-800 hover:bg-gray-700 rounded-xl p-3 flex items-center justify-between">
          <div class="text-left">
            <p class="font-semibold" x-text="t.name"></p>
            <p class="text-xs text-gray-400">
              <span x-text="t.items.length"></span> упр · ≈
              <span x-text="t.estimatedMinutes"></span> мин
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400"></i>
        </button>
      </template>
    </div>
  </div>
  </template>

  <!-- ========== v2 СТРАНИЦА: ПРОСМОТР ШАБЛОНА ========== -->
  <template x-if="page === 'template-view'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-6">
      <button type="button" @click="page = 'programs'" class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="getSelectedTemplate()?.name || 'Шаблон'"></h1>
    </div>

    <template x-if="getSelectedTemplate()">
      <div>
        <div class="bg-gray-800 rounded-xl p-3 mb-4 text-sm text-gray-400">
          ≈ <span x-text="getSelectedTemplate().estimatedMinutes"></span> мин ·
          <span x-text="getSelectedTemplate().items.length"></span> упражнений
        </div>

        <div class="space-y-2">
          <template x-for="(item, idx) in getSelectedTemplate().items" :key="idx">
            <div class="bg-gray-800 rounded-xl p-3">
              <div class="flex items-start gap-3">
                <!-- Приоритет + superset -->
                <div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm shrink-0"
                     :class="{
                       'bg-red-500/25 text-red-300': item.priority === 'A',
                       'bg-blue-500/25 text-blue-300': item.priority === 'B',
                       'bg-gray-500/25 text-gray-300': item.priority === 'C',
                     }">
                  <span x-text="item.priority + (item.supersetGroup ? item.supersetGroup.toUpperCase() : '')"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="font-semibold truncate" x-text="getTemplateItemExercise(item)?.name || item.exerciseId"></p>
                  <p class="text-xs text-gray-400">
                    <span x-show="item.reps" x-text="item.sets + ' × ' + item.reps + ' повт'"></span>
                    <span x-show="item.timeSec" x-text="item.sets + ' × ' + item.timeSec + ' сек'"></span>
                    <span x-show="item.weight" x-text="' · ' + item.weight + ' кг'"></span>
                    · отдых <span x-text="item.restSec || 60"></span> сек
                  </p>
                  <!-- подсказка прогрессии -->
                  <template x-if="getSuggestionForItem(item)?.hint">
                    <p class="text-xs text-emerald-300 mt-1">
                      💡 <span x-text="getSuggestionForItem(item).hint"></span>
                    </p>
                  </template>
                </div>
                <!-- video -->
                <template x-if="getTemplateItemExercise(item) && getExerciseVideoUrlV2(getTemplateItemExercise(item))">
                  <a :href="getExerciseVideoUrlV2(getTemplateItemExercise(item))"
                     target="_blank" rel="noopener"
                     class="p-2 hover:bg-gray-700 rounded-lg shrink-0"
                     title="Посмотреть видео">
                    <i data-lucide="play-circle" class="w-5 h-5 text-red-400"></i>
                  </a>
                </template>
              </div>
            </div>
          </template>
        </div>

        <p class="text-xs text-gray-500 mt-4 text-center">
          Запуск тренировки из шаблона будет подключён на следующем шаге.
        </p>
      </div>
    </template>
  </div>
  </template>

  <!-- ========== v2 СТРАНИЦА: БАНК УПРАЖНЕНИЙ ========== -->
  <template x-if="page === 'bank'">
  <div class="min-h-screen p-4 pb-24">
    <div class="flex items-center gap-3 mb-4">
      <button type="button" @click="bankSelectedId ? (bankSelectedId = null) : (page = 'dashboard')"
              class="p-2 hover:bg-gray-800 rounded-lg">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h1 class="text-xl font-bold" x-text="bankSelectedId ? (getSelectedExercise()?.name || 'Упражнение') : 'Банк упражнений'"></h1>
    </div>

    <!-- Список + фильтры -->
    <template x-if="!bankSelectedId">
      <div>
        <div class="bg-gray-800 rounded-xl p-3 mb-3">
          <input type="text" x-model="bankQuery" placeholder="Поиск по названию..."
                 class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm placeholder-gray-400 mb-2" />
          <div class="grid grid-cols-2 gap-2 mb-2">
            <select x-model="bankFilterMuscle" class="bg-gray-700 rounded-lg px-2 py-2 text-sm">
              <option value="">Все мышцы</option>
              <template x-for="m in getAllMuscleGroups()" :key="m">
                <option :value="m" x-text="formatMuscle(m)"></option>
              </template>
            </select>
            <select x-model="bankFilterEquipment" class="bg-gray-700 rounded-lg px-2 py-2 text-sm">
              <option value="">Всё оборудование</option>
              <template x-for="eq in getAllEquipment()" :key="eq">
                <option :value="eq" x-text="formatEquipment(eq)"></option>
              </template>
            </select>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" x-model="bankShoulderOnly" class="rounded" />
              <span class="text-gray-300">Безопасно для плеча</span>
            </label>
            <select x-model="bankLevel" class="bg-gray-700 rounded-lg px-2 py-1 text-xs ml-auto">
              <option value="">Любой уровень</option>
              <option value="beginner">Начинающий</option>
              <option value="intermediate">Средний</option>
              <option value="advanced">Продвинутый</option>
            </select>
          </div>
        </div>

        <p class="text-xs text-gray-400 mb-2">
          Найдено: <span x-text="filteredBank().length"></span>
        </p>

        <div class="space-y-2">
          <template x-for="ex in filteredBank()" :key="ex.id">
            <button type="button"
                    @click="selectBankExercise(ex.id)"
                    class="w-full bg-gray-800 hover:bg-gray-700 rounded-xl p-3 flex items-center gap-3 text-left">
              <div class="flex-1 min-w-0">
                <p class="font-semibold truncate" x-text="ex.name"></p>
                <p class="text-xs text-gray-400 truncate">
                  <span x-text="formatEquipment(ex.equipment)"></span> ·
                  <span x-text="(ex.muscles || []).map(m => formatMuscle(m)).join(', ')"></span>
                </p>
              </div>
              <template x-if="ex.shoulderFriendly === true">
                <span class="text-[10px] bg-emerald-500/20 text-emerald-300 px-1.5 py-0.5 rounded shrink-0">плечо ок</span>
              </template>
              <template x-if="ex.shoulderFriendly === false">
                <span class="text-[10px] bg-red-500/20 text-red-300 px-1.5 py-0.5 rounded shrink-0">⚠ плечо</span>
              </template>
              <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
            </button>
          </template>
        </div>
      </div>
    </template>

    <!-- Деталь упражнения -->
    <template x-if="bankSelectedId && getSelectedExercise()">
      <div class="space-y-3">
        <template x-if="getExerciseVideoUrlV2(getSelectedExercise())">
          <a :href="getExerciseVideoUrlV2(getSelectedExercise())" target="_blank" rel="noopener"
             class="block bg-red-500/20 hover:bg-red-500/30 border border-red-500/40 rounded-xl p-3 text-center">
            <i data-lucide="play-circle" class="w-6 h-6 inline text-red-400 mr-2"></i>
            <span class="font-semibold text-red-200">Посмотреть видео на YouTube</span>
          </a>
        </template>

        <div class="bg-gray-800 rounded-xl p-4">
          <dl class="grid grid-cols-2 gap-y-3 text-sm">
            <dt class="text-gray-400">Тип</dt>
            <dd x-text="formatExerciseType(getSelectedExercise().type)"></dd>
            <dt class="text-gray-400">Оборудование</dt>
            <dd x-text="formatEquipment(getSelectedExercise().equipment)"></dd>
            <dt class="text-gray-400">Мышцы</dt>
            <dd x-text="(getSelectedExercise().muscles || []).map(m => formatMuscle(m)).join(', ')"></dd>
            <dt class="text-gray-400">Шаг прогрессии</dt>
            <dd>
              <span x-show="getSelectedExercise().stepKg" x-text="'+' + getSelectedExercise().stepKg + ' кг'"></span>
              <span x-show="getSelectedExercise().stepReps" x-text="'+' + getSelectedExercise().stepReps + ' повт'"></span>
              <span x-show="getSelectedExercise().stepTimeSec" x-text="'+' + getSelectedExercise().stepTimeSec + ' сек'"></span>
            </dd>
            <dt class="text-gray-400">Отдых по умолчанию</dt>
            <dd x-text="getSelectedExercise().defaultRest + ' сек'"></dd>
            <dt class="text-gray-400">Уровень</dt>
            <dd x-text="getSelectedExercise().level || '—'"></dd>
            <dt class="text-gray-400">Плечо</dt>
            <dd x-text="getSelectedExercise().shoulderFriendly ? 'безопасно' : 'осторожно'"></dd>
          </dl>
        </div>

        <template x-if="(getSelectedExercise().alts || []).length > 0">
          <div class="bg-gray-800 rounded-xl p-4">
            <h4 class="text-sm text-gray-400 uppercase tracking-wide mb-2">Альтернативы</h4>
            <div class="space-y-1">
              <template x-for="altId in getSelectedExercise().alts" :key="altId">
                <button type="button"
                        @click="selectBankExercise(altId)"
                        class="w-full text-left bg-gray-700/50 hover:bg-gray-700 rounded-lg px-3 py-2 text-sm">
                  → <span x-text="(window.EXERCISE_BY_ID || {})[altId]?.name || altId"></span>
                </button>
              </template>
            </div>
          </div>
        </template>

        <!-- Override videoUrl -->
        <div class="bg-gray-800 rounded-xl p-4">
          <h4 class="text-sm text-gray-400 uppercase tracking-wide mb-2">Своё видео</h4>
          <p class="text-xs text-gray-500 mb-2">Вставь YouTube-ссылку, чтобы заменить авто-поиск.</p>
          <input type="url"
                 :value="getSelectedExercise().videoUrl || ''"
                 @change="saveExerciseVideoOverride(getSelectedExercise().id, $event.target.value)"
                 placeholder="https://www.youtube.com/watch?v=..."
                 class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm placeholder-gray-500" />
        </div>
      </div>
    </template>
  </div>
  </template>

  <!-- Scripts - ПОРЯДОК ВАЖЕН! -->
  <!-- v1 совместимость -->
  <script src="./js/data.js"></script>
  <script src="./icons/exercises.js"></script>
  <!-- v2 модули -->
  <script src="./js/exercise-bank.js"></script>
  <script src="./js/exercise-videos.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/programs.js"></script>
  <script src="./js/timer.js"></script>
  <script src="./js/progression.js"></script>
  <script src="./js/energy-rules.js"></script>
  <script src="./js/trackers.js"></script>
  <!-- Главный компонент -->
  <script src="./js/app.js"></script>
  <!-- v2 расширение Alpine-компонента -->
  <script src="./js/app-v2.js"></script>
  
  <!-- Lucide Icons init -->
  <script>
    document.addEventListener('alpine:initialized', () => {
      console.log('Alpine initialized, creating icons...');
      lucide.createIcons();
      
      var createIconsTimer;
      const observer = new MutationObserver(() => {
        clearTimeout(createIconsTimer);
        createIconsTimer = setTimeout(() => lucide.createIcons(), 50);
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });
  </script>
  
  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
